name: Build And Release

on:
  push:
    tags:
      - "*"

permissions:
  contents: write

jobs:
  quality:
    name: Quality
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: "3.38.3"
          cache: true
          pub-cache: true

      - name: Prepare Android signing
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          echo "$ANDROID_KEYSTORE_BASE64" | base64 --decode > "$RUNNER_TEMP/next_ddl-upload.jks"
          {
            echo "storeFile=$RUNNER_TEMP/next_ddl-upload.jks"
            echo "storePassword=$ANDROID_KEYSTORE_PASSWORD"
            echo "keyAlias=$ANDROID_KEY_ALIAS"
            echo "keyPassword=$ANDROID_KEY_PASSWORD"
          } > android/key.properties

      - name: Get dependencies
        run: flutter pub get

      - name: Analyze
        run: flutter analyze

      - name: Test
        run: flutter test

  build-windows:
    name: Build Windows
    runs-on: windows-latest
    needs: quality
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: "3.38.3"
          cache: true
          pub-cache: true

      - name: Enable Windows desktop
        run: flutter config --enable-windows-desktop

      - name: Install Visual Studio ATL component
        shell: pwsh
        run: |
          $installer = "${env:ProgramFiles(x86)}\Microsoft Visual Studio\Installer\vs_installer.exe"
          $vswhere = "${env:ProgramFiles(x86)}\Microsoft Visual Studio\Installer\vswhere.exe"
          $installPath = & $vswhere -latest -products * -requires Microsoft.VisualStudio.Component.VC.Tools.x86.x64 -property installationPath
          if (-not $installPath) {
            throw "Visual Studio installation path was not found."
          }
          Start-Process -FilePath $installer -ArgumentList @(
            "modify",
            "--installPath", $installPath,
            "--add", "Microsoft.VisualStudio.Component.VC.ATL",
            "--passive",
            "--norestart"
          ) -Wait

      - name: Get dependencies
        run: flutter pub get

      - name: Build Windows release
        run: flutter build windows --release

      - name: Package Windows build
        shell: pwsh
        run: |
          Compress-Archive -Path build/windows/x64/runner/Release/* -DestinationPath windows-release.zip

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-release
          path: windows-release.zip

  build-android:
    name: Build Android
    runs-on: ubuntu-latest
    needs: quality
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "17"
          cache: gradle

      - name: Cache Android SDK components
        id: android_sdk_cache
        uses: actions/cache@v4
        with:
          path: |
            /usr/local/lib/android/sdk/cmake/3.22.1
            /usr/local/lib/android/sdk/ndk/28.2.13676358
            /usr/local/lib/android/sdk/licenses
          key: ${{ runner.os }}-android-sdk-cmake-3.22.1-ndk-28.2.13676358
          restore-keys: |
            ${{ runner.os }}-android-sdk-cmake-3.22.1-
            ${{ runner.os }}-android-sdk-

      - name: Prewarm Android CMake/NDK
        if: steps.android_sdk_cache.outputs.cache-hit != 'true'
        env:
          ANDROID_SDK_ROOT: /usr/local/lib/android/sdk
        run: |
          SDKMANAGER="$(command -v sdkmanager || true)"
          if [ -z "$SDKMANAGER" ]; then
            SDKMANAGER="${ANDROID_SDK_ROOT}/cmdline-tools/latest/bin/sdkmanager"
          fi
          echo "Using sdkmanager: ${SDKMANAGER}"
          yes | "${SDKMANAGER}" --licenses > /dev/null || true
          "${SDKMANAGER}" --install "cmake;3.22.1" "ndk;28.2.13676358"

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: "3.38.3"
          cache: true
          pub-cache: true

      - name: Get dependencies
        run: flutter pub get

      - name: Prepare Android signing
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          echo "$ANDROID_KEYSTORE_BASE64" | base64 --decode > "$RUNNER_TEMP/next_ddl-upload.jks"
          {
            echo "storeFile=$RUNNER_TEMP/next_ddl-upload.jks"
            echo "storePassword=$ANDROID_KEYSTORE_PASSWORD"
            echo "keyAlias=$ANDROID_KEY_ALIAS"
            echo "keyPassword=$ANDROID_KEY_PASSWORD"
          } > android/key.properties

      - name: Build Android release APK
        run: flutter build apk --release --target-platform android-arm64

      - name: Upload Android artifact
        uses: actions/upload-artifact@v4
        with:
          name: android-apk
          path: build/app/outputs/flutter-apk/app-release.apk

  release:
    name: Publish Release
    runs-on: ubuntu-latest
    needs:
      - build-windows
      - build-android
    steps:
      - name: Download all build artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets
          merge-multiple: true

      - name: Publish to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          body: |
            Compatibility note:
            - Android 1.1.6 uses the first formal release keystore.
            - If you installed 1.1.1 or earlier with the old debug signature, Android cannot upgrade it directly.
            - Please uninstall the old app once, then install 1.1.6. Future formally signed versions can upgrade normally after that.
          files: |
            release-assets/windows-release.zip
            release-assets/app-release.apk
